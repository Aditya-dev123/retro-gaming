<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>∞ Endless Run</title>
<link rel="stylesheet" href="runner.css"/>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="hud">
  <div class="hud-item"><span>SCORE </span><b id="h-score">0</b></div>
  <div class="hud-item"><span>COINS </span><b id="h-coins">0</b></div>
  <div class="hud-item"><span>DIST </span><b id="h-dist">0</b><span>m</span></div>
  <div class="hud-item"><span>BEST </span><b id="h-best">0</b></div>
</div>

<div id="effects-bar"></div>

<div class="overlay" id="ov-start">
  <div class="overlay-title" style="font-size:40px;color:var(--orange);text-shadow:0 0 30px #ff6b3577;">∞</div>
  <div class="overlay-title" style="font-size:20px;color:var(--orange);">ENDLESS RUN</div>
  <div class="overlay-sub">
    SPACE / ↑ &nbsp;—&nbsp; JUMP (double jump!)<br>
    ↓ &nbsp;—&nbsp; SLIDE UNDER OBSTACLES<br>
    P &nbsp;—&nbsp; PAUSE
  </div>
  <button class="btn" onclick="startGame()">START RUNNING</button>
</div>

<div class="overlay hidden" id="ov-pause">
  <div class="overlay-title" style="font-size:30px;color:var(--yellow);">PAUSED</div>
  <div class="overlay-sub" style="margin-bottom:20px;">Game is paused</div>
  <button class="btn" onclick="resumeGame()">RESUME</button>
</div>

<div class="overlay hidden" id="ov-over">
  <div class="overlay-title" style="font-size:28px;color:var(--red);text-shadow:0 0 20px #ef233c66;">GAME OVER</div>
  <div class="stats-row" id="over-stats"></div>
  <button class="btn" onclick="startGame()">TRY AGAIN</button>
</div>

<div id="mobile-zones">
  <div id="zone-jump"></div>
  <div id="zone-slide"></div>
</div>

<script src="runner.js"></script>
</body>
</html>
